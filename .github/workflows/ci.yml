name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  docs-corpus:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Frontend docs tests
        working-directory: frontend
        run: bun test

      - name: Generate docs corpus
        working-directory: frontend
        run: bun run scripts/extract-docs.ts

      - name: Check docs corpus freshness
        run: git diff --exit-code -- api/docs_corpus/generated/pages.json

  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: make install

      - name: Lint
        run: make lint

      - name: Test
        run: make test

      - name: Export schemas (frontend contract)
        run: make schemas-json

      - name: Demo pipeline (end-to-end on fixtures)
        run: make run
